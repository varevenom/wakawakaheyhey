<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(to bottom, #fff3e0, #ffe0b2);
    }

    header {
      background: #ff6f00;
      color: white;
      padding: 20px;
      text-align: center;

    .teams {

      justify-content: space-between;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .status {
      font-weight: bold;
      color: red;
    }

    .news {
      margin-top: 30px;
      background: white;
      padding: 15px;
      border-radius: 12px;
    }

</head>

<body>

<header>
  🏏 WakaWakaHeyHey - Live IPL Scores
</header>

<div class="container">

  <!-- LIVE MATCH -->
  <div class="match">
    <div class="status">LIVE</div>
    <div class="teams">
      <span>CSK - 178/4 (18.2)</span>
      <span>MI - 150/6 (17.0)</span>
    </div>

  </div>

  <!-- UPCOMING MATCH -->
  <div class="match">

</html>
