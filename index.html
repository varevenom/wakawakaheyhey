<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WakaWakaHeyHey Sports Live</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #020617, #0f172a 55%, #111827);
      color: white;
    }
    .topbar {
      padding: 24px 18px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      position: sticky;
      top: 0;
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    h1 {
      margin: 0;
      color: #22c55e;
      font-size: 38px;
    }
    .subtitle {
      color: #94a3b8;
      margin-top: 8px;
      font-size: 15px;
    }
    .container {
      width: 92%;
      max-width: 1000px;
      margin: 28px auto 40px;
    }
    .league {
      font-size: 26px;
      color: #38bdf8;
      font-weight: bold;
      margin: 28px 0 14px;
      text-align: center;
    }
    .grid {
      display: grid;
      gap: 16px;
    }
    .card {
      background: rgba(30, 41, 59, 0.95);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }
    .match-title {
      font-size: 21px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #f8fafc;
    }
    .score {
      font-size: 18px;
      color: #facc15;
      margin-bottom: 8px;
    }
    .status {
      color: #cbd5e1;
      font-size: 15px;
    }
    .tag {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      background: rgba(255,255,255,0.08);
      color: #93c5fd;
    }
    .ad-box {
      margin-top: 24px;
      padding: 18px;
      text-align: center;
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 16px;
      color: #94a3b8;
      background: rgba(255,255,255,0.02);
    }
    .footer {
      text-align: center;
      color: #64748b;
      padding: 28px 16px 36px;
      font-size: 14px;
    }
    .loading {
      text-align: center;
      color: #cbd5e1;
    }
    .small {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 6px;
    }
    @media (max-width: 700px) {
      h1 { font-size: 30px; }
      .league { font-size: 22px; }
      .match-title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>⚽🏏 WakaWakaHeyHey Sports Live</h1>
    <div class="subtitle">Live football, IPL scores, and match updates</div>
  </div>

  <div class="container">
    <div class="league">⚽ Football Matches</div>
    <div id="football" class="grid">
      <div class="card loading">Loading football matches...</div>
    </div>

    <div class="league">🏏 IPL / Cricket Matches</div>
    <div id="cricket" class="grid">
      <div class="card loading">Loading cricket matches...</div>
    </div>

    <div class="ad-box">Advertisement space ready 💸</div>
  </div>

  <div class="footer">WakaWakaHeyHey • live sports hub</div>

  <script>
    async function loadFootball() {
      const container = document.getElementById("football");
      container.innerHTML = `<div class="card loading">Loading football matches...</div>`;

      try {
        const res = await fetch("/api/football");
        const data = await res.json();

        container.innerHTML = "";

        const matches =
          data.response ||
          data.data ||
          data.matches ||
          data.result ||
          [];

        if (!Array.isArray(matches) || matches.length === 0) {
          container.innerHTML = `
            <div class="card">
              <div class="tag">Football</div>
              <div class="match-title">No football matches found</div>
              <div class="status">API responded but returned no matches.</div>
            </div>
          `;
          return;
        }

        matches.slice(0, 8).forEach(match => {
          const home =
            match.home_name ||
            match.homeTeam?.name ||
            match.team1?.name ||
            "Home";
          const away =
            match.away_name ||
            match.awayTeam?.name ||
            match.team2?.name ||
            "Away";
          const score =
            match.score ||
            `${match.homeScore ?? "-"} - ${match.awayScore ?? "-"}`;
          const league =
            match.league_name ||
            match.league ||
            "Football";
          const status =
            match.status ||
            match.match_status ||
            "Match";

          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <div class="tag">${league}</div>
            <div class="match-title">${home} vs ${away}</div>
            <div class="score">${score}</div>
            <div class="status">${status}</div>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        console.error("Football API error:", err);
        container.innerHTML = `
          <div class="card">
            <div class="tag">Football</div>
            <div class="match-title">Could not load football matches</div>
            <div class="status">API error or rate limit hit.</div>
          </div>
        `;
      }
    }

    function renderCricketMatch(match) {
      const info = match.matchInfo || {};
      const score = match.matchScore || {};

      const team1 = info.team1?.teamName || "Team 1";
      const team2 = info.team2?.teamName || "Team 2";

      const t1s1 = score.team1Score?.inngs1;
      const t2s1 = score.team2Score?.inngs1;

      const team1Score = t1s1 ? `${t1s1.runs}/${t1s1.wickets} (${t1s1.overs})` : "Score not available";
      const team2Score = t2s1 ? `${t2s1.runs}/${t2s1.wickets} (${t2s1.overs})` : "Score not available";

      return `
        <div class="card">
          <div class="tag">${info.matchFormat || "Cricket"}</div>
          <div class="match-title">${team1} vs ${team2}</div>
          <div class="score">${team1}: ${team1Score}</div>
          <div class="score">${team2}: ${team2Score}</div>
          <div class="status">${info.status || info.state || "Recent / Upcoming"}</div>
          <div class="small">${info.seriesName || ""}</div>
        </div>
      `;
    }

    async function loadCricket() {
      const container = document.getElementById("cricket");
      container.innerHTML = `<div class="card loading">Loading cricket matches...</div>`;

      try {
        const res = await fetch("/api/cricket");
        const data = await res.json();

        container.innerHTML = "";

        if (!data.typeMatches || data.typeMatches.length === 0) {
          container.innerHTML = `
            <div class="card">
              <div class="tag">Cricket</div>
              <div class="match-title">No cricket data available right now</div>
              <div class="status">Check back soon 🏏</div>
            </div>
          `;
          return;
        }

        const allMatches = data.typeMatches
          .flatMap(type => type.seriesMatches || [])
          .flatMap(series => (series.seriesAdWrapper && series.seriesAdWrapper.matches) ? series.seriesAdWrapper.matches : []);

        const matchesToShow = allMatches.slice(0, 8);

        if (matchesToShow.length === 0) {
          container.innerHTML = `
            <div class="card">
              <div class="tag">Cricket</div>
              <div class="match-title">No cricket matches right now</div>
              <div class="status">The API responded, but no matches were found.</div>
            </div>
          `;
          return;
        }

        matchesToShow.forEach(match => {
          container.innerHTML += renderCricketMatch(match);
        });
      } catch (err) {
        console.error("Cricket API error:", err);
        container.innerHTML = `
          <div class="card">
            <div class="tag">Cricket</div>
            <div class="match-title">Could not load cricket matches</div>
            <div class="status">API error or rate limit hit. Try again in a bit.</div>
          </div>
        `;
      }
    }

    loadFootball();
    loadCricket();

    setInterval(() => {
      loadFootball();
      loadCricket();
    }, 15000);
  </script>
</body>
</html>
